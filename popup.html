<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: system-ui, sans-serif;
      width: 260px;
      padding: 16px;
      margin: 0;
    }
    h2 {
      margin: 0 0 12px;
      font-size: 14px;
      font-weight: 600;
    }
    .info {
      font-size: 12px;
      color: #555;
      margin-bottom: 14px;
      line-height: 1.6;
      white-space: pre-line;
    }
    button {
      width: 100%;
      padding: 8px;
      font-size: 13px;
      cursor: pointer;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #f5f5f5;
    }
    button:hover { background: #e8e8e8; }
    #status {
      font-size: 12px;
      color: #1a73e8;
      margin-top: 8px;
      display: none;
    }
  </style>
</head>
<body>
  <h2>History Deduplicator</h2>
  <div class="info" id="lastRun">Loading...</div>
  <button id="runNow">Run Now</button>
  <div id="status">Running...</div>
  <script src="popup.js"></script>
</body>
</html>
